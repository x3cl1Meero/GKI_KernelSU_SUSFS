name: 内核构建 - Android 14 (6.1)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU Variants"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - SukiSU(40726)
          - SukiSU(40548)
          - ReSukiSU
        default: SukiSU
      version:
        description: "Custom Version Name (Optional)"
        required: false
        type: string
      build_time:
        description: "Custom Build Time (Optional，N or leave blank=Current UTC)"
        required: false
        type: string
        default: "N"
      use_kpm:
        description: "KPM Features"
        required: true
        type: choice
        default: "patched"
        options:
          - "disabled"
          - "enabled"
          - "patched"
      droidspaces:
        description: "Droidspaces Container Support"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      artifact_upload_mode:
        description: "Building a Product Upload Model"
        required: true
        type: choice
        options:
          - "Upload Only AnyKernel3.zip"
          - "Upload All"
        default: "Upload Only AnyKernel3.zip"
      droidspaces_ntsync:
        description: "Enable Droidspaces Container NTSync Support（Must be enabled Droidspaces）"
        required: false
        type: boolean
        default: false
      use_zram:
        description: "Enable ZRAM Reinforcement Learning Algorithms"
        required: true
        type: boolean
        default: true
      use_bbg:
        description: "Enable Baseband-guard LSM Module"
        required: true
        type: boolean
        default: true # Изменено с false на true
      bbr_variant:
        description: "BBR variant (bbr=standard|bbrv3=6.1-specific|disabled=off)"
        required: false
        type: choice
        options:
          - "bbr"
          - "bbrv3"
          - "disabled"
        default: "bbrv3"
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        required: false
        type: boolean
        default: true
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "N"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      bbr_variant:
        required: false
        type: string
        default: "bbrplus"
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      artifact_upload_mode:
        required: false
        type: string
        default: "Upload All"
      droidspaces_ntsync:
        required: false
        type: boolean
        default: false
      called_from_main:
        description: "Whether from main.yml Call（For internal use only）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a14-6-1:
    name: "6.1.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "25"
            os_patch_level: "2023-10"
          - sub_level: "43"
            os_patch_level: "2023-11"
          - sub_level: "57"
            os_patch_level: "2024-01"
          - sub_level: "68"
            os_patch_level: "2024-03"
          - sub_level: "75"
            os_patch_level: "2024-05"
          - sub_level: "78"
            os_patch_level: "2024-06"
          - sub_level: "84"
            os_patch_level: "2024-07"
          - sub_level: "90"
            os_patch_level: "2024-08"
          - sub_level: "93"
            os_patch_level: "2024-09"
          - sub_level: "99"
            os_patch_level: "2024-10"
          - sub_level: "112"
            os_patch_level: "2024-11"
          - sub_level: "115"
            os_patch_level: "2024-12"
          - sub_level: "118"
            os_patch_level: "2025-01"
          - sub_level: "124"
            os_patch_level: "2025-02"
          - sub_level: "128"
            os_patch_level: "2025-03"
          - sub_level: "129"
            os_patch_level: "2025-04"
          - sub_level: "134"
            os_patch_level: "2025-05"
          - sub_level: "138"
            os_patch_level: "2025-06"
          - sub_level: "141"
            os_patch_level: "2025-07"
          - sub_level: "145"
            os_patch_level: "2025-09"
          - sub_level: "157"
            os_patch_level: "2025-12"
          - sub_level: "162"
            os_patch_level: "2026-03"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android14"
      kernel_version: "6.1"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      bbr_variant: ${{ inputs.bbr_variant || 'bbrv3' }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}
      artifact_upload_mode: ${{ inputs.artifact_upload_mode }}

  # 仅在直接触发时运行，从 main.yml 调用时跳过
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
