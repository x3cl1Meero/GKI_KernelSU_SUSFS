
name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 SukiSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''
      build_time:
        description: '自定义构建时间 (可选，N或留空=当前UTC)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KDC - LZ4HC + Crypto)'
        required: true
        type: boolean
        default: false
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard'
        required: true
        type: boolean
        default: false
      supp_op:
        description: '启用 OnePlus 8E 支持'
        required: true
        type: boolean
        default: false
      set_defbbr:
        description: '设置 BBR 为默认拥塞算法'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      send_telegram:
        description: '发送 Telegram 通知'
        required: true
        type: boolean
        default: true

env:
  PYTHON_VERSION: '3.10'

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      SCRIPTS_DIR: ./.github/workflows/scripts
    outputs:
      build_matrix: ${{ steps.generate.outputs.matrix }}
      kernel_version: ${{ steps.generate.outputs.kernel_version }}
      classified_matrix: ${{ steps.generate.outputs.classified_matrix }}
      matrix_summary: ${{ steps.generate.outputs.matrix_summary }}
      cache_key: ${{ steps.get_cache_key.outputs.cache_key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get cache key
        id: get_cache_key
        run: echo "cache_key=${{ github.ref_name }}-ccache" >> $GITHUB_OUTPUT

      # Здесь запускается ваш matrix_generator.py, который формирует задания на параллельную сборку
      - name: Generate build matrix
        id: generate
        run: python3 ${{ env.SCRIPTS_DIR }}/matrix_generator.py

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Важно: Если одно ядро упадет, остальные продолжат собираться
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    env:
      SCRIPTS_DIR: ./.github/workflows/scripts
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Create 10GB Swap Space
        run: |
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip xz-utils openssl pixz
          pip install PyYAML

      - name: Setup AVB signing key
        env:
          BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
        run: |
          mkdir -p toolchain/linux-x86/bin
          echo "$BOOT_SIGN_KEY" > toolchain/linux-x86/bin/testkey.pem
          echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/toolchain/linux-x86/bin/testkey.pem" >> $GITHUB_ENV

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          mkdir -p ~/.ccache
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        id: restore-ccache
        uses: ./.github/actions/cache-restore
        with:
          cache_path: /home/runner/.ccache
          cache_key: ${{ github.ref_name }}-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          cache_bucket: ccache-cache

      - name: Build kernel
        run: |
          # =========================================================================
          # ИСПРАВЛЕНИЕ: Патчер mmap.c запускается ТОЛЬКО для ядра 5.15. 
          # Ядра 6.1+ пропускают этот шаг, что предотвращает ошибку 'const vm_flags_t'
          # =========================================================================
          if [ "${{ matrix.config.kernel }}" = "5.15" ]; then
            (
              echo "⏳ [Background Patcher] Ожидание исходников ядра 5.15 для патчинга mmap.c..."
              for i in {1..300}; do
                FILE=$(find /tmp/gki-build -path "*/common/mm/mmap.c" 2>/dev/null | head -n 1)
                if [ -n "$FILE" ]; then
                  if grep -q "vm_flags_clear" "$FILE"; then
                    echo "✅ [Background Patcher] Файл mmap.c найден! Применяю фикс для 5.15..."
                    sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/g' "$FILE"
                    echo "✅ [Background Patcher] Патч успешно применен. Демон завершает работу."
                    break
                  fi
                fi
                sleep 2
              done
            ) &
          else
            echo "⏭️ [Background Patcher] Ядро ${{ matrix.config.kernel }}: Патч mmap.c пропущен (в новых версиях vm_flags — строгая константа)."
          fi
          # =========================================================================

          cd ${{ env.SCRIPTS_DIR }}

          ARGS="--android ${{ matrix.config.android }}"
          ARGS="$ARGS --kernel ${{ matrix.config.kernel }}"
          ARGS="$ARGS --sub-level ${{ matrix.config.sub_level }}"
          ARGS="$ARGS --os-patch ${{ matrix.config.os_patch }}"
          [ -n "${{ matrix.config.revision }}" ] && ARGS="$ARGS --revision ${{ matrix.config.revision }}"
          ARGS="$ARGS --ksu-version ${{ github.event.inputs.kernelsu_version }}"
          ARGS="$ARGS --no-release"

          [ "${{ github.event.inputs.use_zram }}" = "true" ] && ARGS="$ARGS --zram"
          [ "${{ github.event.inputs.use_kpm }}" = "false" ] && ARGS="$ARGS --no-kpm"
          [ "${{ github.event.inputs.BBG }}" = "true" ] && ARGS="$ARGS --bbg"
          [ "${{ github.event.inputs.supp_op }}" = "true" ] && ARGS="$ARGS --op8e"
          [ "${{ github.event.inputs.set_defbbr }}" = "true" ] && ARGS="$ARGS --bbr"
          
          [ -z "${{ github.event.inputs.kernelsu_commit }}" ] || ARGS="$ARGS --ksu-commit=${{ github.event.inputs.kernelsu_commit }}"
          [ -z "${{ github.event.inputs.susfs_commit }}" ] || ARGS="$ARGS --susfs-commit=${{ github.event.inputs.susfs_commit }}"
          [ -z "${{ github.event.inputs.custom_version }}" ] || ARGS="$ARGS --custom-version=${{ github.event.inputs.custom_version }}"

          if [ -n "${{ github.event.inputs.build_time }}" ]; then
            echo "Передаем пользовательскую дату сборки: ${{ github.event.inputs.build_time }}"
            python3 build.py $ARGS --build-time "${{ github.event.inputs.build_time }}"
          else
            python3 build.py $ARGS
          fi

      - name: Save ccache
        uses: ./.github/actions/cache-save
        with:
          cache_path: /home/runner/.ccache
          cache_key: ${{ github.ref_name }}-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          cache_bucket: ccache-cache
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts
        id: prepare-artifacts
        run: |
          mkdir -p artifacts
          find /tmp/gki-build -name "*.zip" -type f -exec cp {} artifacts/ \;
          find /tmp/gki-build -name "*.img" -type f -exec cp {} artifacts/ \;
          if [ -z "$(ls -A artifacts/)" ]; then
            echo "没有找到构建产物"
            echo "artifacts_exist=false" >> $GITHUB_OUTPUT
          else
            echo "artifacts_exist=true" >> $GITHUB_OUTPUT
            ls -la artifacts/
            cd artifacts && sha256sum * > SHA256SUMS.txt && cd ..
          fi

      - name: Upload artifacts
        if: steps.prepare-artifacts.outputs.artifacts_exist == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          path: artifacts/*

      - name: Record build result
        if: always()
        run: |
          mkdir -p build-results
          if [ -f "artifacts/SHA256SUMS.txt" ]; then
            cp artifacts/SHA256SUMS.txt build-results/${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}.txt
          fi
          echo "${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}:outcome=${{ job.status }}" >> build-results/status.txt

      - name: Upload build results
        uses: actions/upload-artifact@v7
        with:
          name: build-results-${{ matrix.config.android }}-${{ matrix.config.kernel }}-${{ matrix.config.sub_level }}
          path: build-results/
          retention-days: 1

  release:
    needs: [prepare, build]
    if: ${{ github.event.inputs.make_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SCRIPTS_DIR: ./.github/workflows/scripts
      WORKSPACE_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts
          pattern: 'kernel-*'
          merge-multiple: true

      - name: Download build results
        uses: actions/download-artifact@v8
        with:
          pattern: 'build-results-*'
          path: build-results
          merge-multiple: true

      - name: Prepare build summary
        id: prepare-summary
        run: |
          mkdir -p build-results
          echo "=== 构建摘要 ===" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(cat build-results/status.txt 2>/dev/null | wc -l || echo 0)
          SUCCESS=$(grep ':outcome=success$' build-results/status.txt 2>/dev/null | wc -l || echo 0)
          FAILED=$(grep ':outcome=failure$' build-results/status.txt 2>/dev/null | wc -l || echo 0)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "| Total | Success | Failed |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| $TOTAL | $SUCCESS | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "=== 状态 ==="
          cat build-results/status.txt 2>/dev/null || echo "No status file"

      - name: Prepare release files
        id: prepare-release-files
        if: steps.prepare-summary.outputs.success != '0'
        run: |
          mkdir -p release-files
          python3 ${{ env.SCRIPTS_DIR }}/extract_artifacts.py all-artifacts release-files --build-results build-results
          ls -la release-files/

      - name: Generate release body
        if: steps.prepare-summary.outputs.success != '0'
        run: |
          python3 ${{ env.SCRIPTS_DIR }}/release_generator.py ${{ env.WORKSPACE_ROOT }}/release-files/RELEASE_BODY.md
          echo "=== 发布内容 ==="
          cat release-files/RELEASE_BODY.md

      - name: Create release
        if: steps.prepare-summary.outputs.success != '0'
        uses: softprops/action-gh-release@v3
        id: create_release
        with:
          tag_name: ${{ needs.prepare.outputs.kernel_version }}
          name: GKI Kernel ${{ needs.prepare.outputs.kernel_version }}
          draft: false
          generate_release_notes: false
          files: |
            release-files/*
          body_path: release-files/RELEASE_BODY.md

      - name: Get release URL
        if: steps.prepare-summary.outputs.success != '0'
        id: get-release-url
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.kernel_version }}"
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "Release URL: $RELEASE_URL"

      - name: Send Telegram Notification
        if: ${{ github.event.inputs.send_telegram == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          SUCCESS: ${{ steps.prepare-summary.outputs.success }}
          FAILED: ${{ steps.prepare-summary.outputs.failed }}
        run: |
          if [ "$SUCCESS" -gt 0 ]; then
            python3 ${{ env.SCRIPTS_DIR }}/telegram_notify.py release \
              "${{ needs.prepare.outputs.kernel_version }}" \
              "${{ steps.get-release-url.outputs.release_url }}" \
              "${{ env.WORKSPACE_ROOT }}/release-files/RELEASE_BODY.md" \
              "" \
              "" \
              "$SUCCESS" \
              "$FAILED"
          else
            python3 ${{ env.SCRIPTS_DIR }}/telegram_notify.py release \
              "${{ needs.prepare.outputs.kernel_version }}" \
              "${{ steps.get-release-url.outputs.release_url }}" \
              "" \
              "" \
              "" \
              "0" \
              "${{ steps.prepare-summary.outputs.total }}"
          fi
