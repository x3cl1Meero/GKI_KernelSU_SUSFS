name: 内核构建流程

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      # ==================== 基础配置 ====================
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string

      # ==================== KernelSU 配置 ====================
      ksu_variant:
        required: true
        type: string

      # ==================== 可选配置 ====================
      version:
        required: false
        type: string
      revision:
        required: false
        type: string
        default: "r1"
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"

      # ==================== 功能开关 ====================
      use_zram:
        required: true
        type: boolean
        default: true
      use_bbg:
        required: true
        type: boolean
        default: true
      bbr_variant:
        required: false
        type: string
        # Допустимые значения: "disabled" | "bbr" | "bbrv3" | "bbrplus"
        # bbrv3   — только для kernel_version 6.1  (патч net/ipv4/tcp_bbr.c из google/bbr)
        # bbrplus — только для kernel_version 5.10 и 5.15 (патч из 0voice/bbrplus)
        # bbr     — стандартный BBR (ядерный, без патчей) для всех версий
        default: "bbr"
      use_kpm:
        required: true
        type: string
        default: "disabled (关闭)"
      use_rekernel:
        required: false
        type: boolean
        default: false
      enable_susfs:
        required: true
        type: boolean
        default: true
      supp_op:
        required: false
        type: boolean
        default: false
      droidspaces:
        required: false
        type: string
        default: "off"
      artifact_upload_mode:
        required: false
        type: string
        default: "上传全部"
      droidspaces_ntsync:
        required: false
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-${{ inputs.ksu_variant }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: 构建信息摘要
        run: |
          echo "========================================"
          echo "       内核构建配置摘要"
          echo "========================================"
          echo "Android 版本  : ${{ inputs.android_version }}"
          echo "内核版本      : ${{ inputs.kernel_version }}"
          echo "子版本号      : ${{ inputs.sub_level }}"
          echo "补丁级别      : ${{ inputs.os_patch_level }}"
          echo "KSU 变体      : ${{ inputs.ksu_variant }}"
          echo "构建时间      : ${{ inputs.build_time }}"
          echo "SUSFS 状态    : ${{ inputs.enable_susfs }}"
          echo "ZRAM 增强     : ${{ inputs.use_zram }}"
          echo "BBG 补丁      : ${{ inputs.use_bbg }}"
          echo "BBR 变体      : ${{ inputs.bbr_variant }}"
          echo "KPM 功能      : ${{ inputs.use_kpm }}"
          echo "Re-Kernel     : ${{ inputs.use_rekernel }}"
          echo "Droidspaces   : ${{ inputs.droidspaces }}"
          echo "NTSync        : ${{ inputs.droidspaces_ntsync }}"
          echo "产物上传模式  : ${{ inputs.artifact_upload_mode }}"
          echo "Stock Config  : 自动检测 config/stock_defconfig"
          echo "========================================"

      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 初始化构建环境
        run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          LEGACY_SUKISU_CONFIG=""
          case "${{ inputs.ksu_variant }}" in
            SukiSU\(*\)) LEGACY_SUKISU_CONFIG="$GITHUB_WORKSPACE/config/${{ inputs.ksu_variant }}.config" ;;
          esac

          if [ -n "$LEGACY_SUKISU_CONFIG" ] && [ ! -f "$LEGACY_SUKISU_CONFIG" ]; then
            echo "未找到 ${{ inputs.ksu_variant }} 固定提交配置: $LEGACY_SUKISU_CONFIG" >&2
            exit 1
          fi

          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          LEGACY_SUKISU_CONFIG=$LEGACY_SUKISU_CONFIG
          DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig
          SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu
          KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches
          SUKISU_PATCHES=$GITHUB_WORKSPACE/SukiSU_patch
          ZZH_PATCHES=$GITHUB_WORKSPACE
          ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3
          ACTION_BUILD=$GITHUB_WORKSPACE/Action-Build
          AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool
          MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py
          UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py
          BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          EOF

          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      - name: 显示配置信息
        run: |
          CONFIG_FILE="$GITHUB_WORKSPACE/config/config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "加载配置文件: $CONFIG_FILE"
            cat "$CONFIG_FILE"
          fi
          if [ -n "$LEGACY_SUKISU_CONFIG" ]; then
            echo "加载老版 SukiSU 固定提交配置: $LEGACY_SUKISU_CONFIG"
            cat "$LEGACY_SUKISU_CONFIG"
          fi

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves

      - name: 配置 ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: 恢复 ccache 缓存
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-

      - name: 缓存工具链
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      - name: 下载工具链
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      - name: 生成签名密钥
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > $BOOT_SIGN_KEY_PATH

      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      - name: 克隆依赖仓库
        run: |
          ANYKERNEL_BRANCH="gki-2.0"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"

          echo "克隆 AnyKernel3..."
          git clone https://github.com/WildKernels/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          rm -rf AnyKernel3/.git

          echo "克隆 SUSFS (分支: $SUSFS_BRANCH)..."
          if [ -n "$LEGACY_SUKISU_CONFIG" ]; then
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          elif [ "${{ inputs.ksu_variant }}" == "SukiSU" ]; then
            if ! git clone https://github.com/ShirkNeko/susfs4ksu.git -b "$SUSFS_BRANCH" 2>/dev/null; then
              echo "ShirkNeko 仓库未找到分支 $SUSFS_BRANCH，回退到 simonpunk 原版..."
              git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
            fi
          else
            git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          fi

          if [ -n "$LEGACY_SUKISU_CONFIG" ]; then
            SUSFS_FIXED_COMMIT=$(grep "^${SUSFS_BRANCH}=" "$LEGACY_SUKISU_CONFIG" | cut -d'=' -f2-)
            if [ -z "$SUSFS_FIXED_COMMIT" ]; then
              echo "未在 $LEGACY_SUKISU_CONFIG 配置 $SUSFS_BRANCH 的固定 SUSFS 提交" >&2
              exit 1
            fi
            echo "${{ inputs.ksu_variant }} 固定 SUSFS 提交: $SUSFS_FIXED_COMMIT"
            git -C susfs4ksu checkout "$SUSFS_FIXED_COMMIT"
          fi

          CONFIG_FILE="config/config"
          if [ -z "$LEGACY_SUKISU_CONFIG" ] && [ -f "$CONFIG_FILE" ]; then
            CUSTOM_ENABLED=$(grep "^custom=" "$CONFIG_FILE" | cut -d'=' -f2)
            if [ "$CUSTOM_ENABLED" == "true" ]; then
              CUSTOM_COMMIT=$(grep "^${SUSFS_BRANCH}=" "$CONFIG_FILE" | cut -d'=' -f2)
              if [ -n "$CUSTOM_COMMIT" ]; then
                echo "切换 SUSFS 到自定义提交: $CUSTOM_COMMIT"
                cd susfs4ksu
                git checkout "$CUSTOM_COMMIT"
                cd ..
              fi
            fi
          fi

          SUSFS_LATEST_COMMIT_DATE=$(git -C susfs4ksu log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
          echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          echo "SUSFS 仓库最新提交日期: $SUSFS_LATEST_COMMIT_DATE"

          echo "准备补丁资源..."
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          echo "使用当前仓库补丁目录: $ZZH_PATCHES"
          git clone https://github.com/Numbersf/Action-Build.git --depth=1

      - name: 初始化并同步内核源码
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "初始化 repo，分支: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "检测到已弃用的分支: $FORMATTED_BRANCH"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "REMOTE_BRANCH=$REMOTE_BRANCH" >> $GITHUB_ENV

      - name: 应用 Stock Config 伪装
        run: |
          STOCK_SRC="$GITHUB_WORKSPACE/config/stock_defconfig"
          STOCK_DST="$KERNEL_ROOT/common/arch/arm64/configs/stock_defconfig"

          if [ ! -f "$STOCK_SRC" ]; then
            echo "未检测到 $STOCK_SRC，跳过 Stock Config 伪装。"
            exit 0
          fi

          mkdir -p "$(dirname "$STOCK_DST")"
          if ! cp "$STOCK_SRC" "$STOCK_DST"; then
            echo "::error::复制 stock_defconfig 失败: $STOCK_SRC -> $STOCK_DST"
            exit 1
          fi
          echo "已复制 stock_defconfig -> $STOCK_DST"

          NEW_RULE='$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE'
          OLD_RULE='$(obj)/config_data: $(KCONFIG_CONFIG) FORCE'
          TARGET_MAKEFILE="$KERNEL_ROOT/common/kernel/Makefile"

          if [ ! -f "$TARGET_MAKEFILE" ]; then
            echo "::error::未找到 $TARGET_MAKEFILE"
            exit 1
          fi

          if grep -qF "$NEW_RULE" "$TARGET_MAKEFILE"; then
            echo "config_data 规则已是 stock_defconfig，跳过。"
          elif grep -qF "$OLD_RULE" "$TARGET_MAKEFILE"; then
            sed -i 's|$(obj)/config_data: $(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' "$TARGET_MAKEFILE"
            echo "已替换 config_data 规则: $TARGET_MAKEFILE"
          else
            echo "::error::未在 $TARGET_MAKEFILE 找到规则: $OLD_RULE"
            exit 1
          fi

      - name: 提取实际子版本号
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          echo "实际子版本号: $ACTUAL_SUBLEVEL"

      - name: 修复 glibc 2.38 兼容性
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          RAW_SUB="${{ inputs.sub_level }}"
          [[ ! "$RAW_SUB" =~ ^[0-9]+$ ]] && CURRENT_SUB=99999 || CURRENT_SUB=$RAW_SUB

          NEEDS_FIX=false
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" && $CURRENT_SUB -le 186 ]] ||
             [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" && $CURRENT_SUB -le 119 ]] ||
             [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" && $CURRENT_SUB -le 43 ]]; then
            NEEDS_FIX=true
          fi

          if [ "$NEEDS_FIX" = true ]; then
            GLIBC_VERSION=$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')
            if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n1)" = "2.38" ]; then
              echo "应用 glibc 2.38 兼容性修复..."
              sed -i '/\$(Q)\$(MAKE) -C \$(SUBCMD_SRC) OUTPUT=\$(abspath \$(dir \$@))\/ \$(abspath \$@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile 2>/dev/null || true

              if [[ "${{ inputs.kernel_version }}" == "5.10" || "${{ inputs.kernel_version }}" == "5.15" ]]; then
                sed -i '/char \*buf = NULL;/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++) {/for (i = 0; subcommands[i]; i++) {/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i '/if (subcommands) {/a int i;' tools/lib/subcmd/parse-options.c 2>/dev/null || true
                sed -i 's/for (int i = 0; subcommands\[i\]; i++)/for (i = 0; subcommands[i]; i++)/' tools/lib/subcmd/parse-options.c 2>/dev/null || true
              fi
            fi
          fi

      - name: 添加一加 8E 处理器支持
        if: inputs.supp_op
        working-directory: ${{ env.KERNEL_ROOT }}/common/drivers
        run: |
          echo "下载一加 8E 支持补丁..."
          curl -LSs "https://github.com/zzh20188/GKI_KernelSU_SUSFS/raw/refs/heads/dev/hmbird_patch.c" -o hmbird_patch.c
          echo "obj-y += hmbird_patch.o" >> Makefile

      - name: 确定 KernelSU 分支
        id: ksu-branch
        run: |
          variant_input="${{ inputs.ksu_variant }}"

          case "$variant_input" in
            "Official"|"ReSukiSU")
              BRANCH="-s main"
              ;;
            "SukiSU")
              if [ "${{ inputs.enable_susfs }}" = "false" ]; then
                BRANCH="-s main"
              else
                BRANCH="-s builtin"
              fi
              ;;
            "Next")
              BRANCH=""
              ;;
            *)
              if [ -z "$LEGACY_SUKISU_CONFIG" ] || [ ! -f "$LEGACY_SUKISU_CONFIG" ]; then
                echo "未知变体: $variant_input" >&2
                exit 1
              fi
              SUKISU_FIXED_COMMIT=$(grep "^sukisu=" "$LEGACY_SUKISU_CONFIG" | cut -d'=' -f2-)
              if [ -z "$SUKISU_FIXED_COMMIT" ]; then
                echo "未在 $LEGACY_SUKISU_CONFIG 配置 SukiSU 固定提交" >&2
                exit 1
              fi
              BRANCH="-s $SUKISU_FIXED_COMMIT"
              ;;
          esac

          # 检查自定义提交 (仅对 SukiSU 生效)
          CONFIG_FILE="config/config"
          if [ -f "$CONFIG_FILE" ]; then
            CUSTOM_ENABLED=$(grep "^custom=" "$CONFIG_FILE" | cut -d'=' -f2)
            if [ "$CUSTOM_ENABLED" == "true" ] && [ "$variant_input" == "SukiSU" ]; then
              SUKISU_COMMIT=$(grep "^sukisu=" "$CONFIG_FILE" | cut -d'=' -f2)
              if [ -n "$SUKISU_COMMIT" ]; then
                BRANCH="-s $SUKISU_COMMIT"
                echo "SukiSU 使用自定义提交: $SUKISU_COMMIT"
              fi
            fi
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "KSU 分支: $BRANCH"

      - name: 添加 KernelSU
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          case "${{ inputs.ksu_variant }}" in
            "Official")
              echo "添加 KernelSU 官方版..."
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash $BRANCH

              cd KernelSU
              KSU_GIT_VERSION=$(git rev-list --count HEAD)
              KSU_VERSION=$((20000 + KSU_GIT_VERSION))
              echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

              if [ -f "kernel/Kbuild" ]; then
                sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
              fi
              cd ..
              ;;
            "Next")
              echo "添加 KernelSU-Next..."
              curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s dev_susfs
              ;;
            "SukiSU")
              echo "添加 ${{ inputs.ksu_variant }}..."
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash $BRANCH
              ;;
            "ReSukiSU")
              echo "添加 ReSukiSU..."
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash $BRANCH
              ;;
            *)
              if [ -z "$LEGACY_SUKISU_CONFIG" ]; then
                echo "未知变体: ${{ inputs.ksu_variant }}" >&2
                exit 1
              fi
              echo "添加 ${{ inputs.ksu_variant }}..."
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash $BRANCH
              ;;
          esac

          if [ -d "KernelSU/.git" ]; then
            KSU_LATEST_COMMIT_DATE=$(git -C KernelSU log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "KSU_LATEST_COMMIT_DATE=$KSU_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          else
            echo "KSU_LATEST_COMMIT_DATE=未知" >> $GITHUB_ENV
          fi

      - name: 配置 SukiSU 管理器信息
        if: inputs.ksu_variant == 'SukiSU' || inputs.ksu_variant == 'SukiSU(40726)' || inputs.ksu_variant == 'SukiSU(40548)'
        working-directory: ${{ env.KERNEL_ROOT }}/KernelSU
        run: |
          KBUILD_FILE="./kernel/Kbuild"
          CUSTOM_TAG="${{ vars.MANAGER_STR }}"

          if [ ! -f "$KBUILD_FILE" ]; then
            echo "未找到 $KBUILD_FILE，跳过 SukiSU 版本标识定制"
            exit 0
          fi

          GIT_HASH=$(git rev-parse --short=8 HEAD)
          BRANCH_NAME="${BRANCH#-s }"
          if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "$BRANCH" ]; then
            BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
          fi

          if [ -n "$CUSTOM_TAG" ]; then
            VERSION_TEMPLATE="v\$1-$CUSTOM_TAG@$BRANCH_NAME[$GIT_HASH]"
          else
            VERSION_TEMPLATE="v\$1-$GIT_HASH@$BRANCH_NAME"
          fi

          awk -v body="$VERSION_TEMPLATE" '
            BEGIN {
              in_block = 0
              replaced = 0
            }
            /^[[:space:]]*define get_ksu_version_full$/ {
              print
              print body
              in_block = 1
              replaced = 1
              next
            }
            in_block && /^[[:space:]]*endef$/ {
              print
              in_block = 0
              next
            }
            !in_block {
              print
            }
            END {
              if (!replaced) {
                exit 1
              }
            }
          ' "$KBUILD_FILE" > "${KBUILD_FILE}.tmp" && mv "${KBUILD_FILE}.tmp" "$KBUILD_FILE"

          echo "已更新 get_ksu_version_full 模板: $VERSION_TEMPLATE"

      - name: 应用 SUSFS 补丁
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "应用 SUSFS 补丁..."

          cp $SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp $SUSFS4KSU/kernel_patches/fs/* ./common/fs/
          cp $SUSFS4KSU/kernel_patches/include/linux/* ./common/include/linux/

          case "${{ inputs.ksu_variant }}" in
            "Official")
              cd ./KernelSU
              cp $SUSFS4KSU/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
              # 兼容旧版补丁：仅当补丁仍只修改 kernel/Makefile 时，才替换为 kernel/Kbuild
              if grep -q '^diff --git a/kernel/Makefile b/kernel/Makefile' ./10_enable_susfs_for_ksu.patch \
                && ! grep -q '^diff --git a/kernel/Kbuild b/kernel/Kbuild' ./10_enable_susfs_for_ksu.patch; then
                sed -i 's|kernel/Makefile|kernel/Kbuild|g' ./10_enable_susfs_for_ksu.patch
              fi
              patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true

              cd ..
              ;;
            "Next"|"SukiSU"|"SukiSU(40726)"|"SukiSU(40548)"|"ReSukiSU")
              echo "Next/SukiSU/SukiSU(40726)/SukiSU(40548)/ReSukiSU 使用内置 SUSFS 支持"
              ;;
          esac

          cd $KERNEL_ROOT/common
          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi

          if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              echo "临时调整 Android 12 5.10 base.c 上下文"
              perl -i -pe 's/(int|size_t)\s+this_len\s*=\s*min_t\s*\(\s*\1\s*,/size_t this_len = min_t(size_t,/;' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              echo "临时调整 Android 12 5.10 fdinfo.c 上下文"
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 107 ]]; then
              echo "临时调整 Android 13 5.10 fdinfo.c 上下文"
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              echo "临时调整 Android 13 5.15 namespace.c/open.c/fdinfo.c 上下文"
              if ! grep -qF '#include <linux/mnt_idmapping.h>' fs/namespace.c; then
                sed -i '/^#include <linux\/shmem_fs.h>$/a #include <linux/mnt_idmapping.h>' fs/namespace.c
              fi
              if ! grep -qF '#include <linux/mnt_idmapping.h>' fs/open.c; then
                sed -i '/^#include <linux\/compat.h>$/a #include <linux/mnt_idmapping.h>' fs/open.c
              fi
              sed -i '/^[[:space:]]*\/\*$/,/^[[:space:]]*u32 mask = mark->mask & IN_ALL_EVENTS;$/d' fs/notify/fdinfo.c
              perl -i -pe 's/\bmask,\s*mark->ignored_mask/inotify_mark_user_mask(mark)/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:%x/ignored_mask:0/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 25 ]] && ! grep -qF '#include <trace/hooks/sched.h>' fs/proc/base.c; then
              echo "临时调整 Android 14 6.1 sched.h 上下文"
              sed -i '/^#include <trace\/events\/oom.h>$/a #include <trace/hooks/sched.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 141 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/proc/base.c; then
              echo "临时调整 Android 14 6.1 dma-buf.h 上下文"
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -ge 157 ]]; then
              echo "临时调整 Android 14 6.1 namespace.c 上下文"
              sed -i '/^#include <trace\/hooks\/blk.h>$/d' fs/namespace.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -le 30 ]] && ! grep -qF 'last_vma_end = vma->vm_end;' fs/proc/task_mmu.c; then
              echo "临时调整 Android 15 6.6 task_mmu.c 上下文"
              sed -i '/smap_gather_stats(vma, &mss, last_vma_end);/a\last_vma_end = vma->vm_end;' fs/proc/task_mmu.c
            fi
            if [[ "$CURRENT_SUB" -le 92 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/proc/base.c; then
              echo "临时调整 Android 15 6.6 base.c 上下文"
              sed -i '/^#include <linux\/cpufreq_times.h>$/a #include <linux/dma-buf.h>' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 57 ]] && ! grep -qF '#include <linux/zswap.h>' mm/memory.c; then
              echo "临时调整 Android 15 6.6 memory.c 上下文"
              sed -i '/^#include <linux\/sched\/sysctl.h>$/a #include <linux/zswap.h>' mm/memory.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
            if [[ "$CURRENT_SUB" -ge 58 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/exec.c; then
              echo "临时调整 Android 16 6.12 exec.c 临时调整"
              sed -i '0,/^#include /s//#include <linux\/dma-buf.h>\n&/' fs/exec.c
            fi
          fi

          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          # 主补丁应用后还原临时上下文
          if [[ "${{ inputs.android_version }}" == "android12" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 43 ]]; then
              echo "还原 Android 12 5.10 base.c 临时调整"
              sed -i 's/^size_t this_len = min_t(size_t, count, PAGE_SIZE);$/int this_len = min_t(int, count, PAGE_SIZE);/' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 117 ]]; then
              echo "还原 Android 12 5.10 fdinfo.c 临时调整"
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.10" ]]; then
            if [[ "$CURRENT_SUB" -le 107 ]]; then
              echo "还原 Android 13 5.10 fdinfo.c 临时调整"
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              echo "还原 Android 13 5.15 临时调整"
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/namespace.c
              sed -i '/#include <linux\/mnt_idmapping.h>$/d' fs/open.c
              perl -i -pe 's/^(\s+if \(inode\) \{)/$1\n\t\t\/\*\n\t\t * IN_ALL_EVENTS represents all of the mask bits\n\t\t * that we expose to userspace.  There is at\n\t\t * least one bit (FS_EVENT_ON_CHILD) which is\n\t\t * used only internally to the kernel.\n\t\t *\/\n\t\tu32 mask = mark->mask & IN_ALL_EVENTS;/m' fs/notify/fdinfo.c
              perl -i -pe 's/\binotify_mark_user_mask\(mark\)/mask, mark->ignored_mask/g' fs/notify/fdinfo.c
              perl -i -pe 's/ignored_mask:0/ignored_mask:%x/g' fs/notify/fdinfo.c
              sed -i 's|i_uid_into_mnt(i_user_ns(&fi->inode), &fi->inode).val|i_uid_into_mnt(\&init_user_ns, \&fi->inode).val|g' fs/susfs.c
              sed -i 's|i_uid_into_mnt(i_user_ns(inode), inode).val|i_uid_into_mnt(\&init_user_ns, inode).val|g' fs/susfs.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android14" && "${{ inputs.kernel_version }}" == "6.1" ]]; then
            if [[ "$CURRENT_SUB" -le 25 ]]; then
              sed -i '/^#include <trace\/hooks\/sched.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 141 ]]; then
              echo "还原 Android 14 6.1 base.c 临时调整"
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -ge 157 ]] && ! grep -qF '#include <trace/hooks/blk.h>' fs/namespace.c; then
              echo "还原 Android 14 6.1 namespace.c 临时调整"
              sed -i '/^#include "internal.h"$/a #include <trace/hooks/blk.h>' fs/namespace.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android15" && "${{ inputs.kernel_version }}" == "6.6" ]]; then
            if [[ "$CURRENT_SUB" -le 92 ]]; then
              echo "还原 Android 15 6.6 base.c 临时调整"
              sed -i '/^#include <linux\/dma-buf.h>$/d' fs/proc/base.c
            fi
            if [[ "$CURRENT_SUB" -le 57 ]]; then
              echo "还原 Android 15 6.6 memory.c 临时调整"
              sed -i '/^#include <linux\/zswap.h>$/d' mm/memory.c
            fi
          fi

          if [[ "${{ inputs.android_version }}" == "android16" && "${{ inputs.kernel_version }}" == "6.12" ]]; then
            if [[ "$CURRENT_SUB" -ge 58 ]] && ! grep -qF '#include <linux/dma-buf.h>' fs/exec.c; then
              echo "还原 Android 16 6.12 exec.c 临时调整"
              sed -i '0,/^#include /s//#include <linux\/dma-buf.h>\n&/' fs/exec.c
            fi
          fi

      - name: 克隆 Droidspaces 补丁仓库
        if: inputs.droidspaces != 'off'
        run: |
          git clone --depth 1 https://github.com/ravindu644/Droidspaces-OSS.git /tmp/Droidspaces-OSS
          echo "DROIDSPACES_PATCHES=/tmp/Droidspaces-OSS/Documentation/resources/kernel-patches/GKI" >> $GITHUB_ENV

      - name: 备份基准 defconfig
        run: cp "$DEFCONFIG" "$DEFCONFIG.orig"

      - name: 集成 Droidspaces 支持
        if: inputs.droidspaces != 'off'
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          KERNEL_VER="${{ inputs.kernel_version }}"
          SLOT="${{ inputs.droidspaces }}"

          SLOT_NAME=$(echo "$SLOT" | sed 's/\(.\)/\1_/g; s/_$//')
          echo "应用 Droidspaces SYSVIPC kABI 修复补丁 (槽位: $SLOT / $SLOT_NAME)..."
          case "$KERNEL_VER" in
            6.12)
              PATCH_FILE="$DROIDSPACES_PATCHES/kernel-6.12/001.GKI-6.12-or-above-fix_sysvipc_kabi.patch"
              ;;
            5.10|5.15|6.1|6.6)
              PATCH_FILE="$DROIDSPACES_PATCHES/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_${SLOT_NAME}.patch"
              ;;
            *)
              echo "::warning::Droidspaces: 未适配的内核版本 $KERNEL_VER，跳过补丁"
              exit 0
              ;;
          esac
          if ! patch -p1 --forward < "$PATCH_FILE"; then
            echo "::warning::SYSVIPC kABI 补丁应用失败，可能已应用或上下文不匹配"
          fi

          if [ "$KERNEL_VER" = "5.10" ]; then
            echo "应用 Droidspaces POSIX_MQUEUE kABI 修复补丁 (5.10)..."
            POSIX_PATCH="$DROIDSPACES_PATCHES/below-kernel-6.12/002.5.10_or_lower_use_android_abi_padding_for_posix_mqueue.patch"
            if ! patch -p1 --forward < "$POSIX_PATCH"; then
              echo "::warning::POSIX_MQUEUE kABI 补丁应用失败，可能已应用或上下文不匹配"
            fi
          fi

          if [ "$KERNEL_VER" = "6.12" ]; then
            if [ -f "ipc/msgutil.c" ] && ! grep -qF 'EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"; then
              sed -i '/^struct msg_msgseg {/i EXPORT_SYMBOL(init_ipc_ns);' "ipc/msgutil.c"
              echo "已为 init_ipc_ns 补充符号导出"
            fi

            if [ -f "ipc/namespace.c" ] && ! grep -qF 'EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"; then
              sed -i '/^static struct ns_common \*ipcns_get(/i EXPORT_SYMBOL(put_ipc_ns);' "ipc/namespace.c"
              echo "已为 put_ipc_ns 补充符号导出"
            fi
          fi

          echo "添加 Droidspaces 内核配置..."
          enable_config() {
            local cfg="$1"
            if grep -q "^${cfg}=y" "$DEFCONFIG"; then
              echo "  已启用: $cfg"
            elif grep -q "^# ${cfg} is not set" "$DEFCONFIG"; then
              sed -i "s/^# ${cfg} is not set$/${cfg}=y/" "$DEFCONFIG"
              echo "  已切换: $cfg"
            else
              echo "${cfg}=y" >> "$DEFCONFIG"
              echo "  已添加: $cfg"
            fi
          }

          config_defined() {
            local name="${1#CONFIG_}"
            grep -RqsE --include='Kconfig*' "^[[:space:]]*(menuconfig|config)[[:space:]]+${name}$" .
          }

          enable_config_if_defined() {
            local cfg="$1"
            if config_defined "$cfg"; then
              enable_config "$cfg"
            else
              echo "  当前内核未定义: $cfg，跳过"
            fi
          }

          enable_config CONFIG_SYSVIPC
          enable_config CONFIG_POSIX_MQUEUE
          enable_config CONFIG_IPC_NS
          enable_config CONFIG_PID_NS
          enable_config CONFIG_DEVTMPFS

          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_ADDRTYPE
          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_LOG
          enable_config_if_defined CONFIG_NETFILTER_XT_MATCH_RECENT
          enable_config_if_defined CONFIG_IP_SET
          enable_config_if_defined CONFIG_IP_SET_HASH_IP
          enable_config_if_defined CONFIG_IP_SET_HASH_NET
          enable_config_if_defined CONFIG_NETFILTER_XT_SET

          enable_config_if_defined CONFIG_NETFILTER_XT_TARGET_REJECT
          enable_config_if_defined CONFIG_IP_NF_TARGET_REJECT

          echo "Droidspaces 集成完成"

      - name: 注入 NTSync 内核配置
        if: inputs.droidspaces != 'off' && inputs.droidspaces_ntsync
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -e
          echo "=== 开始注入 NTSync 内核补丁 ==="
          echo "Android 版本: ${{ inputs.android_version }}"
          echo "Kernel 版本: ${{ inputs.kernel_version }}"

          case "${{ inputs.android_version }}-${{ inputs.kernel_version }}" in
            android12-5.10) NTSYNC_PATCH="ntsync_compat_android12-5.10" ;;
            android13-5.15) NTSYNC_PATCH="ntsync_compat_android13-5.15" ;;
            android14-6.1) NTSYNC_PATCH="ntsync_compat_android14-6.1" ;;
            android15-6.6) NTSYNC_PATCH="ntsync_compat_android15-6.6" ;;
            android16-6.12) NTSYNC_PATCH="ntsync_compat_android16-6.12" ;;
            *) echo "::warning::NTSync: 未适配跳过补丁"; exit 0 ;;
          esac

          wget -q "https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/ntsync_base.patch"
          wget -q "https://raw.githubusercontent.com/Goldzxcbug/Droidspaces_Kernel_patch/refs/heads/main/NTsync/${NTSYNC_PATCH}.patch"

          patch -p1 < "ntsync_base.patch"
          patch -p1 < "${NTSYNC_PATCH}.patch"

          cd ..
          CONFIG_PATH="./common/arch/arm64/configs/gki_defconfig"
          sed -i '/CONFIG_NTSYNC is not set/d' "$CONFIG_PATH"
          if ! grep -q "^CONFIG_NTSYNC=y" "$CONFIG_PATH"; then
            echo "CONFIG_NTSYNC=y" >> "$CONFIG_PATH"
          fi

      - name: 配置 ZRAM LZ4 补丁栈
        if: inputs.use_zram
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "升级 LZ4..."
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c

          cp -r $ZZH_PATCHES/zram/lz4/* ./lib/lz4/
          cp -r $ZZH_PATCHES/zram/include/linux/* ./include/linux/
          bash $ZZH_PATCHES/zram/apply_lz4_neon.sh

          if [ -f "fs/f2fs/Makefile" ] && ! grep -qF "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" "fs/f2fs/Makefile"; then
            echo "f2fs-\$(CONFIG_F2FS_IOSTAT) += iostat.o" >> "fs/f2fs/Makefile"
          fi

      - name: 配置 ZRAM 选项
        if: inputs.use_zram
        run: |
          CONFIG_FILE="$DEFCONFIG"

          if [ "${{ inputs.kernel_version }}" = "5.10" ]; then
            echo "Ветка 5.10: Принудительно встраиваем ZRAM в ядро (=y)"
            cat >> "$CONFIG_FILE" <<'EOF'
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_MODULE_SIG=n
          CONFIG_CRYPTO_LZO=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          EOF
          else
            # Для веток 5.15, 6.1 и выше оставляем стоковые значения (=m)
            # Это предотвращает бутлуп из-за конфликта со стоковыми .ko модулями на устройстве
            echo "Ветки GKI (5.15/6.1): Оставляем ZRAM в режиме модулей (=m) для стабильной загрузки"
          fi

      - name: 集成 Baseband-guard LSM 模块
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "=== 集成 Baseband-guard ==="
          
          # 1. Загружаем и выполняем скрипт установки напрямую (метод из 6.6.142)
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          
          # 2. Добавляем CONFIG_BBG в defconfig
          if ! grep -q '^CONFIG_BBG=y' "$DEFCONFIG"; then
            echo "CONFIG_BBG=y" >> "$DEFCONFIG"
          fi
          
          # 3. Добавляем baseband_guard в security/Kconfig (вместо старого метода с заменой CONFIG_LSM)
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
          
          echo "=== BBG done ==="
          
      - name: 应用 Re-Kernel
        if: inputs.use_rekernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Integrating Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/

          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF

          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF

          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi

          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"

      - name: 配置内核选项
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

          if [ "${{ inputs.ksu_variant }}" == "SukiSU" ] || [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ] || [ "${{ inputs.ksu_variant }}" == "Next" ]; then
            if [[ "${{ inputs.use_kpm }}" == enabled* ]]; then
              echo "CONFIG_KPM=y" >> "$DEFCONFIG"
            fi
          fi

          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 配置 BBR 拥塞控制
        if: inputs.bbr_variant != 'disabled' && inputs.bbr_variant != ''
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          set -e
          BBR_VARIANT="${{ inputs.bbr_variant }}"
          KERNEL_VER="${{ inputs.kernel_version }}"
          echo "=== BBR 变体: $BBR_VARIANT / 内核: $KERNEL_VER ==="

          # ── Валидация совместимости ─────────────────────────────────────
          if [ "$BBR_VARIANT" = "bbrv3" ] && [ "$KERNEL_VER" != "6.1" ]; then
            echo "::error::BBRv3 поддерживается только для kernel 6.1 (текущий: $KERNEL_VER)"
            exit 1
          fi
          if [ "$BBR_VARIANT" = "bbrplus" ] && [ "$KERNEL_VER" != "5.10" ] && [ "$KERNEL_VER" != "5.15" ]; then
            echo "::error::BBRplus поддерживается только для kernel 5.10 / 5.15 (текущий: $KERNEL_VER)"
            exit 1
          fi

          # ── Применение патча BBRv3 (только для 6.1) ────────────────────
          if [ "$BBR_VARIANT" = "bbrv3" ]; then
            echo "--- Применяем патч BBRv3 для kernel 6.1 ---"
            PATCH_FILE="$GITHUB_WORKSPACE/patches/bbr/bbrv3-6.1.patch"
            if [ ! -f "$PATCH_FILE" ]; then
              echo "Патч не найден локально, скачиваем из репозитория google/bbr ..."
              mkdir -p "$GITHUB_WORKSPACE/patches/bbr"
              # Скачиваем tcp_bbr.c из ветки v3 репозитория google/bbr
              curl -fsSL \
                "https://raw.githubusercontent.com/google/bbr/v3/net/ipv4/tcp_bbr.c" \
                -o /tmp/tcp_bbr_v3.c
              # Создаём унифицированный патч: заменяем tcp_bbr.c целиком
              diff -u net/ipv4/tcp_bbr.c /tmp/tcp_bbr_v3.c > "$PATCH_FILE" || true
            fi
            if [ ! -s "$PATCH_FILE" ]; then
              echo "::error::Патч BBRv3 пуст или не был создан. Проверьте $PATCH_FILE"
              exit 1
            fi
            patch -p1 --forward < "$PATCH_FILE"
            echo "--- BBRv3 патч применён ---"
          fi

          # ── Применение патча BBRplus (только для 5.10 / 5.15) ──────────
          if [ "$BBR_VARIANT" = "bbrplus" ]; then
            echo "--- Применяем патч BBRplus для kernel $KERNEL_VER ---"
            PATCH_FILE="$GITHUB_WORKSPACE/patches/bbr/bbrplus-${KERNEL_VER}.patch"
            if [ ! -f "$PATCH_FILE" ]; then
              echo "Патч не найден локально, скачиваем из репозитория 0voice/bbrplus ..."
              mkdir -p "$GITHUB_WORKSPACE/patches/bbr"
              # Определяем тег/ветку BBRplus под версию ядра
              case "$KERNEL_VER" in
                5.10) BBRPLUS_BRANCH="5.10" ;;
                5.15) BBRPLUS_BRANCH="5.15" ;;
              esac
              curl -fsSL \
                "https://raw.githubusercontent.com/0voice/bbrplus/main/linux-${BBRPLUS_BRANCH}/net/ipv4/tcp_bbr.c" \
                -o /tmp/tcp_bbrplus.c
              diff -u net/ipv4/tcp_bbr.c /tmp/tcp_bbrplus.c > "$PATCH_FILE" || true
            fi
            if [ ! -s "$PATCH_FILE" ]; then
              echo "::error::Патч BBRplus пуст или не был создан. Проверьте $PATCH_FILE"
              exit 1
            fi
            patch -p1 --forward < "$PATCH_FILE"
            echo "--- BBRplus патч применён ---"
          fi

          # ── Конфиг-флаги (общие для всех вариантов) ────────────────────
          echo "Инжектируем конфиг-флаги BBR..."
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_BBR=y
          EOF

          # BBRv3: дополнительный флаг для нового планировщика (если присутствует в Kconfig)
          if [ "$BBR_VARIANT" = "bbrv3" ]; then
            if grep -rqs 'config TCP_CONG_BBR2' net/ipv4/; then
              echo "CONFIG_TCP_CONG_BBR2=y" >> "$DEFCONFIG"
              echo "  -> CONFIG_TCP_CONG_BBR2=y добавлен (BBRv3 alias)"
            fi
          fi

          echo "=== BBR ($BBR_VARIANT) настройка завершена ==="

      - name: 添加 SUSFS 配置
        if: inputs.enable_susfs
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      - name: 设置自定义构建时间
        shell: bash
        env:
          INPUT_TIME: ${{ inputs.build_time }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "N" && "$INPUT_TIME" != "n" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi
          echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

      - name: 编译内核
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: timeout
          command: |
            set -ex
            cd "$KERNEL_ROOT"
            # Disable ALL GKI-specific checks for custom kernel builds
            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' ./common/build.config.gki.aarch64
            sed -i '/^MODULES_ORDER=/d' ./common/build.config.gki.aarch64
            sed -i 's/KMI_ENFORCED=1/KMI_ENFORCED=0/g' ./common/build.config.gki.aarch64
            # Remove ABI check by patching compare_to_symbol_list to always pass
            if [ -f "build/abi/compare_to_symbol_list" ]; then
              sed -i 's/exit 1/exit 0/g' build/abi/compare_to_symbol_list
            fi
            if [ -f "build/build.sh" ]; then
              LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang" || exit 1
            else
              FRAG="common/arch/arm64/configs/ksu.fragment"
              diff "$DEFCONFIG.orig" "$DEFCONFIG" | grep '^>' | sed 's/^> //; s/^[[:space:]]*//' > "$FRAG" || true
              cp "$DEFCONFIG.orig" "$DEFCONFIG"
              FRAG_FLAG=""
              if [ -s "$FRAG" ]; then
                FRAG_FLAG="--defconfig_fragment=//common:arch/arm64/configs/ksu.fragment"
              fi
              tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast --lto=thin $FRAG_FLAG //common:kernel_aarch64_dist || exit 1
            fi

      - name: 准备 Boot 镜像
        run: |
          mkdir -p bootimgs

          if [ "${{ inputs.android_version }}" == "android12" ] || [ "${{ inputs.android_version }}" == "android13" ]; then
            SRC_DIR="$KERNEL_ROOT/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"
          else
            SRC_DIR="$KERNEL_ROOT/bazel-bin/common/kernel_aarch64"
          fi

          cp "$SRC_DIR/Image" ./bootimgs/
          cp "$SRC_DIR/Image" ./
          gzip -n -k -f -9 ./Image > ./Image.gz

      - name: 装配 AnyKernel3 并打包
        run: |
          # 1. Копируем готовое ядро внутрь папки AnyKernel3
          cp ./Image "$ANYKERNEL3/"

          # 2. Переходим в папку AnyKernel3 и упаковываем её в ZIP-архив
          cd "$ANYKERNEL3"
          ZIP_NAME="${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3.zip"
          zip -r "../$ZIP_NAME" *
          cd ..

      - name: 上传 AnyKernel3 刷入包
        if: inputs.artifact_upload_mode != '上传全部'
        uses: actions/upload-artifact@v4
        with:
          name: "[UNZIP_ME_FIRST]_${{ inputs.ksu_variant }}_AnyKernel3"
          path: ./*AnyKernel3.zip
          compression-level: 9

      - name: 上传全部构建产物
        if: inputs.artifact_upload_mode == '上传全部'
        uses: actions/upload-artifact@v4
        with:
          name: "[UNZIP_ME_FIRST]_${{ inputs.ksu_variant }}_All_Outputs"
          path: |
            *AnyKernel3.zip
            *.img
            *.gz
          compression-level: 9

      - name: 上传补丁冲突文件
        if: always() && env.REJ_COUNT > 0
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.ksu_variant }}_kernel-${{ env.CONFIG }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9
