# ========================================
# GKI Kernel Build Entry Point
# ========================================
# This workflow serves as the unified entry point for the project and is used to:
# 1. Build all versions of the GKI kernel
# 2. Retrieve the latest KSU Manager
# 3. Collect patch conflict files for debugging
# 4. Create a GitHub Release (optional)
# ========================================
name: Building the Kernel
# Concurrency Control: Only one instance runs per branch; starting a new instance will terminate the old one
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  actions: write
on:
  workflow_dispatch:
    inputs:
      # ==================== Publish Configuration ====================
      release_type:
        description: "Publication Type"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Release
      # ==================== KernelSU Configuration ====================
      kernelsu_variant:
        description: "KernelSU Variants"
        type: choice
        options:
          - SukiSU
          - SukiSU(40726)
          - SukiSU(40548)
          - ReSukiSU
          - Official
          #- Next
        default: SukiSU
      # ==================== Optional Configurations ====================
      version:
        description: "Custom Version Name (Optional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Custom Build Time (Optional; N or blank = current UTC)"
        type: string
        default: "N"
        required: false
      # ==================== Option Settings ====================
      use_kpm:
        description: "KPM Features"
        type: choice
        default: "Patched"
        options:
          - "Disabled"
          - "Enabled"
          - "Patched"
      droidspaces:
        description: "Droidspaces Container Support (5.10~6.6:Slot Patch, 6.12:On/Off)"
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      droidspaces_ntsync:
        description: "Enable Droidspaces Container NTSync Support（Must be enabled Droidspaces）"
        type: boolean
        default: false
      # ==================== Function Switch ====================
      use_zram:
        description: "Enable ZRAM Reinforcement Learning Algorithms"
        type: boolean
        default: true
      use_bbg:
        description: "Enable Baseband-guard LSM Module"
        type: boolean
        default: true
      bbr_variant_5_10:
        description: "BBR Variants (5.10/5.15:BBR|BBRplus|Disabled)"
        required: false
        type: choice
        options:
          - "BBR"
          - "BBRplus"
          - "Disabled"
        default: "BBRplus"
      bbr_variant_6_1:
        description: "BBR Variants (6.1:BBR|BBRv3(Not available yet*)|disabled)"
        required: false
        type: choice
        options:
          - "BBR"
          - "BBRv3"
          - "Disabled"
        default: "BBRv3"
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        type: boolean
        default: true
      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false
      # ==================== Build Version Selection ====================
      build_a12_5_10:
        description: "Android 12 - 5.10"
        type: boolean
        default: true
      build_a13_5_15:
        description: "Android 13 - 5.15"
        type: boolean
        default: true
      build_a14_6_1:
        description: "Android 14 - 6.1"
        type: boolean
        default: true
      build_all:
        description: "Build all versions"
        type: boolean
        default: false
jobs:
  # ==================== Get Manager ====================
  # Download the latest KernelSU Manager APK and SUSFS module
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
  # ==================== Android 12 - 5.10 Build ====================
  build-a12-5-10:
    if: inputs.build_a12_5_10 || inputs.build_all
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      bbr_variant: ${{ inputs.bbr_variant_5_10 }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      artifact_upload_mode: "Upload All"
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync }}
      called_from_main: true
  # ==================== Android 13 - 5.15 Build ====================
  build-a13-5-15:
    if: inputs.build_a13_5_15 || inputs.build_all
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      bbr_variant: ${{ inputs.bbr_variant_5_15 }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      artifact_upload_mode: "Upload All"
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync }}
      called_from_main: true
  # ==================== Android 14 - 6.1 Build ====================
  build-a14-6-1:
    if: inputs.build_a14_6_1 || inputs.build_all
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      bbr_variant: ${{ inputs.bbr_variant_6_1 }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      artifact_upload_mode: "Upload All"
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync }}
      called_from_main: true
  # ==================== Collecting Files with Patch Conflicts ====================
  # Collect all .rej files from all build tasks to facilitate debugging patch issues
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
    steps:
      - name: Download the conflicting file
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: Resolving Conflicting Files
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: Upload the list of conflicting files
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore
  # ==================== Create Release ====================
  # Create a GitHub Release when `release_type` is not `Actions`
  # This step is only performed on the original repository; it is skipped for forked repositories
  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'x3cl1Meero/GKI_KernelSU_SUSFS' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
    # ==================== Environment Variables ====================
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # ==================== Set Display Name ====================
      # Pre-calculate various display names to simplify subsequent references
      - name: Set Display Name
        run: |
          # KSU Display Name
          case "${{ inputs.kernelsu_variant }}" in
            "Next")      KSU_NAME="KernelSU-Next" ;;
            "Official")  KSU_NAME="KernelSU" ;;
            "SukiSU")    KSU_NAME="SukiSU" ;;
            "ReSukiSU")  KSU_NAME="ReSukiSU" ;;
          esac
          echo "KSU_NAME=$KSU_NAME" >> $GITHUB_ENV

          # Version Information
          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV

          # Feature Toggle Display
          echo "LZ4_STATUS=${{ inputs.use_zram && 'Open' || 'Not enabled' }}" >> $GITHUB_ENV
          echo "BBG_STATUS=${{ inputs.use_bbg && 'Support' || 'Not supported' }}" >> $GITHUB_ENV
          if [[ "${{ inputs.use_kpm }}" == enabled* ]]; then
            echo "KPM_STATUS=Support" >> $GITHUB_ENV
          elif [[ "${{ inputs.use_kpm }}" == patched* ]]; then
            echo "KPM_STATUS=Support（The patch is not yet supported.）" >> $GITHUB_ENV
          else
            echo "KPM_STATUS=Not enabled" >> $GITHUB_ENV
          fi

          # Hook Type
          if [ "${{ inputs.kernelsu_variant }}" = "SukiSU" ] || [ "${{ inputs.kernelsu_variant }}" = "ReSukiSU" ]; then
            echo "HOOK_TYPE=SUSFS Inline Hooks" >> $GITHUB_ENV
          else
            echo "HOOK_TYPE=KPROBE Hooks" >> $GITHUB_ENV
          fi

          # Mount Type
          if [ "${{ inputs.kernelsu_variant }}" = "Official" ]; then
            echo "MOUNT_TYPE=OVERLAYFS" >> $GITHUB_ENV
          else
            echo "MOUNT_TYPE=Magic Mount" >> $GITHUB_ENV
          fi

          # Post Title
          echo "RELEASE_NAME=GKI Kernel: ${KSU_NAME} ${KSU_VER} + SUSFS ${SUS_VER}" >> $GITHUB_ENV
      # ==================== Verify the build status ====================
      # Ensure that all selected build tasks are completed successfully
      - name: Verify the build status
        run: |
          failed=0
          check_build() {
            local selected="$1" job_name="$2" result="$3"
            if [[ "$selected" == "true" && "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Selected build tasks $job_name Failure (Results: $result)"
              failed=1
            fi
          }
          check_build "${{ inputs.build_a12_5_10 || inputs.build_all }}" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
          check_build "${{ inputs.build_a13_5_15 || inputs.build_all }}" "build-a13-5-15" "${{ needs.build-a13-5-15.result }}"
          check_build "${{ inputs.build_a14_6_1 || inputs.build_all }}" "build-a14-6-1" "${{ needs.build-a14-6-1.result }}"
          [[ "$failed" -ne 0 ]] && exit 1 || true
      # ==================== Detection Code ====================
      - name: Detection Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      # ==================== Identify KSU Citations ====================
      # Determine the upstream references for KernelSU based on the actual build logic
      - name: Identify KSU Citations
        run: |
          case "${{ inputs.kernelsu_variant }}" in
            "Official") BRANCH="main" ;;
            "SukiSU")
              if [ "${{ inputs.cancel_susfs }}" = "true" ]; then
                BRANCH="main"
              else
                BRANCH="builtin"
              fi
              ;;
            "ReSukiSU") BRANCH="main" ;;
            "Next") BRANCH="dev" ;;
            *) echo "Error: Unknown variant" >&2; exit 1 ;;
          esac
          echo "KSU_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "BRANCH_INFO=$BRANCH" >> $GITHUB_ENV
      # ==================== Get KernelSU commit information ====================
      # Get Git commit information for the currently used KernelSU version
      - name: Get KernelSU commit information
        run: |
          case "${{ inputs.kernelsu_variant }}" in
            "Official") REPO_URL="https://github.com/tiann/KernelSU.git"; REPO_URL2="tiann/KernelSU" ;;
            "Next") REPO_URL="https://github.com/KernelSU-Next/KernelSU-Next.git"; REPO_URL2="KernelSU-Next/KernelSU-Next" ;;
            "SukiSU") REPO_URL="https://github.com/SukiSU-Ultra/SukiSU-Ultra.git"; REPO_URL2="SukiSU-Ultra/SukiSU-Ultra" ;;
            "ReSukiSU") REPO_URL="https://github.com/ReSukiSU/ReSukiSU.git"; REPO_URL2="ReSukiSU/ReSukiSU" ;;
          esac

          if [ "${{ inputs.kernelsu_variant }}" = "SukiSU" ] && [ -f "config/config" ]; then
            CUSTOM_ENABLED=$(grep "^custom=" config/config | cut -d'=' -f2)
            CUSTOM_COMMIT=$(grep "^sukisu=" config/config | cut -d'=' -f2)
            if [ "$CUSTOM_ENABLED" = "true" ] && [ -n "$CUSTOM_COMMIT" ]; then
              KSU_REF="$CUSTOM_COMMIT"
              KSU_URL="https://github.com/$REPO_URL2/commit/$CUSTOM_COMMIT"
              echo "BRANCH_INFO=custom" >> $GITHUB_ENV
            fi
          fi

          if [ -z "${KSU_REF:-}" ]; then
            COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/${KSU_BRANCH:-main} | awk '{ print $1 }')
            KSU_REF=$COMMIT_HASH
            KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
          fi

          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV
      # ==================== Retrieve SUSFS submission information ====================
      # Retrieve Git commit information for each version of SUSFS
      - name: Retrieve SUSFS submission information
        run: |
          GITLAB_OWNER="simonpunk"
          GITLAB_REPO="susfs4ksu"
          declare -A BRANCH_MAP=(
            ["gki_android12_5_10"]="gki-android12-5.10"
            ["gki_android13_5_15"]="gki-android13-5.15"
            ["gki_android14_6_1"]="gki-android14-6.1"
          )
          for var_name in "${!BRANCH_MAP[@]}"; do
            branch_name="${BRANCH_MAP[$var_name]}"
            COMMIT_HASH=$(git ls-remote https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO.git refs/heads/$branch_name | awk '{ print $1 }')
            if [[ -n "$COMMIT_HASH" ]]; then
              COMMIT_URL="https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO/-/commit/$COMMIT_HASH"
              echo "COMMIT_HASH_${var_name}=$COMMIT_HASH" >> "$GITHUB_ENV"
              echo "COMMIT_URL_${var_name}=$COMMIT_URL" >> "$GITHUB_ENV"
            fi
          done
      # ==================== Generate Release Notes ====================
      # Create a release notes document containing detailed information
      - name: Generate Release Notes
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          if [[ "$KSU_REF" =~ ^[0-9a-f]{40}$ ]]; then
            KSU_DISPLAY_REF="${KSU_REF:0:7}"
          else
            KSU_DISPLAY_REF="$KSU_REF"
          fi

          build_targets=""
          append_target() {
            local selected="$1" label="$2"
            if [[ "$selected" == "true" ]]; then
              if [[ -z "$build_targets" ]]; then
                build_targets="$label"
              else
                build_targets="$build_targets, $label"
              fi
            fi
          }
          append_target "${{ inputs.build_a12_5_10 || inputs.build_all }}" "Android 12 / 5.10"
          append_target "${{ inputs.build_a13_5_15 || inputs.build_all }}" "Android 13 / 5.15"
          append_target "${{ inputs.build_a14_6_1 || inputs.build_all }}" "Android 14 / 6.1"
          if [[ -z "$build_targets" ]]; then
            build_targets="Not selected"
          fi

          : > susfs_commits.md
          append_susfs_commit() {
            local selected="$1" label="$2" hash="$3" url="$4"
            if [[ "$selected" == "true" && -n "$hash" && -n "$url" ]]; then
              printf -- '- %s: [`%s`](%s)\n' "$label" "${hash:0:7}" "$url" >> susfs_commits.md
            fi
          }
          append_susfs_commit "${{ inputs.build_a12_5_10 || inputs.build_all }}" "Android 12 / 5.10" "${COMMIT_HASH_gki_android12_5_10}" "${COMMIT_URL_gki_android12_5_10}"
          append_susfs_commit "${{ inputs.build_a13_5_15 || inputs.build_all }}" "Android 13 / 5.15" "${COMMIT_HASH_gki_android13_5_15}" "${COMMIT_URL_gki_android13_5_15}"
          append_susfs_commit "${{ inputs.build_a14_6_1 || inputs.build_all }}" "Android 14 / 6.1" "${COMMIT_HASH_gki_android14_6_1}" "${COMMIT_URL_gki_android14_6_1}"
          if [[ ! -s susfs_commits.md ]]; then
            echo "- The file corresponding to this build was not found. SUSFS Submit Information." > susfs_commits.md
          fi

          cat > release_body.md << EOF
          ## GKI Kernel Release

          **$KSU_NAME $KSU_VER** + **SUSFS $SUS_VER**

          | 项目 | 内容 |
          |:---|:---|
          | Publication Type | ${{ inputs.release_type }} |
          | Publication Date | $BUILD_DATE |
          | Scope of Work | $build_targets |

          ### Build Configuration

          | Project | Content |
          |:---|:---|
          | KernelSU Variants | $KSU_NAME |
          | KernelSU Branch | $BRANCH_INFO |
          | SUSFS | $SUS_VER |
          | Hook Type | $HOOK_TYPE |
          | Mounting Method | $MOUNT_TYPE |
          | LTO | thin |
          | Baseband-guard LSM Module | $BBG_STATUS |
          | ZRAM / LZ4KD | $LZ4_STATUS |
          | KPM | $KPM_STATUS |

          ### Download Instructions

          Please enter below **Assets** Download the corresponding file here。

          | File Type | Uses |
          |:---|:---|
          | \`*_kernel-*.zip\` | AnyKernel3 Kernel Flashing Package |
          | \`*.img\` | boot、vendor_boot Image files, etc. |
          | \`*.apk\` | KernelSU Manager |
          | \`susfs-*.zip\` | SUSFS Supporting Modules |

          > [!IMPORTANT]
          > Please back up the factory data before flashing. Boot Mirror。
          > If the device fails to start，Please restore the factory image first.，Extract Again KernelSU Provide feedback via the log。

          <details>
          <summary>Post-flashing processing</summary>

          ### Normal Startup

          Install or Update KernelSU After the Manager，Inspection root、Modules and SUSFS Is the status normal?。

          ### Failed to start

          1. Restore to Factory Settings Boot Mirror
          2. Usage KernelSU Manager or recovery Extract Logs
          3. Submit to [Issues](https://github.com/x3cl1Meero/GKI_KernelSU_SUSFS/issues)，Please include the equipment model number、Android Version、Kernel version and file name to flash

          </details>

          <details>
          <summary>Upstream Submission Information</summary>

          **KernelSU**

          - $KSU_NAME: [\`$KSU_DISPLAY_REF\`]($KSU_URL)

          **SUSFS4KSU**

          $(cat susfs_commits.md)

          </details>

          ---

          Recommended Modules：https://github.com/sidex15/ksu_module_susfs

          Unicode To fix the zero-width bypass, please use Xposed Module：https://t.me/real5ec1cff/268
          EOF
      # ==================== Generate Version Tag ====================
      # Generate Incremental Release Tags Based on the SUSFS Version
      - name: Generate Version Tag
        run: |
          # Get the SUSFS version; if `get-manager` is skipped, use the default value
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          if [ -z "$SUS_VERSION" ]; then
            echo "Warning: Not retrieved SUSFS Version，Use the default version number"
            SUS_VERSION="1.0.0"
          fi

          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null | sed 's/-.*//' || echo "")

          if [ "$SUS_VERSION" = "$LATEST_TAG" ]; then
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          else
            LATEST_TAG="$SUS_VERSION-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "生成标签: $NEW_TAG"
      # ==================== Download Build Artifacts ====================
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
      # ==================== Create GitHub Release ====================
      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$NEW_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release_body.md \
            --target "$GITHUB_SHA" \
            $PRERELEASE_FLAG
      # ==================== Upload Manager and Modules ====================
      - name: Upload Manager and SUSFS Module
        continue-on-error: true
        run: |
          echo "Preparing to upload APK and SUSFS Module..."
          apk_count=$(find ./downloaded-artifacts -type f -name "*.apk" | wc -l || true)
          sus_count=$(find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" | wc -l || true)
          echo "APK files: ${apk_count}"
          echo "SUSFS files: ${sus_count}"
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
                  # ==================== Upload Kernel Builds ====================
      - name: Upload Kernel Builds
        run: |
          for dir in ./downloaded-artifacts/*_kernel-*/; do
            # Убеждаемся, что текущий элемент — это директория
            [ -d "$dir" ] || continue
            
            # Пропускаем директории -Rejects
            [[ "$dir" == *-Rejects/ ]] && continue
            
            # Получаем базовое имя папки
            dir_name=$(basename "$dir")
            
            echo "Упаковка $dir_name в ZIP-архив..."
            # Переходим в директорию, архивируем ее содержимое и возвращаемся
            cd "$dir"
            zip -r -q -9 "../${dir_name}.zip" .
            cd - > /dev/null
            
            echo "Загрузка архива ${dir_name}.zip..."
            gh release upload "$NEW_TAG" "./downloaded-artifacts/${dir_name}.zip"
          done

      # ==================== Build Summary ====================
      - name: Build Summary
        run: |
          echo "## Post Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: $NEW_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Link**: https://github.com/$REPO_OWNER/$REPO_NAME/releases/tag/$NEW_TAG" >> $GITHUB_STEP_SUMMARY
