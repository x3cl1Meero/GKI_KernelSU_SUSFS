name: Kernel Build - Android 12 (5.10)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU Variants"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - SukiSU(40726)
          - SukiSU(40548)
          - ReSukiSU
        default: ReSukiSU
      version:
        description: "Custom Version Name (Optional)"
        required: false
        type: string
      build_time:
        description: "Custom Build Time (Optional，N or leave blank=Current UTC)"
        required: false
        type: string
        default: "N"
      use_kpm:
        description: "KPM Features"
        required: true
        type: choice
        default: "disabled (关闭)"
        options:
          - "disabled"
          - "enabled"
          - "patched"
      droidspaces:
        description: "Droidspaces Container Support"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      artifact_upload_mode:
        description: "Building a Product Upload Model"
        required: true
        type: choice
        options:
          - "Upload Only AnyKernel3.zip"
          - "Upload All"
        default: "Upload Only AnyKernel3.zip"
      droidspaces_ntsync:
        description: "Enable Droidspaces Container NTSync Support（Must be enabled Droidspaces）"
        required: false
        type: boolean
        default: false
      use_zram:
        description: "Enable ZRAM Reinforcement Learning Algorithms"
        required: true
        type: boolean
        default: true
      use_bbg:
        description: "Enable Baseband-guard LSM Module"
        required: true
        type: boolean
        default: true # Изменено с false на true
      bbr_variant:
        description: "BBR Variants (bbr=Standard | bbrplus=5.10/5.15 Dedicated | disabled=Close)"
        required: false
        type: choice
        options:
          - "bbr"
          - "bbrplus"
          - "disabled"
        default: "bbrplus"
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        required: false
        type: boolean
        default: true
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "N"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      bbr_variant:
        required: false
        type: string
        default: "bbrplus"
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      artifact_upload_mode:
        required: false
        type: string
        default: "Upload All"
      droidspaces_ntsync:
        required: false
        type: boolean
        default: false
      called_from_main:
        description: "Whether from main.yml Call（For internal use only）"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a12-5-10:
    name: "5.10.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "66"
            os_patch_level: "2022-01"
            revision: "r11"
          - sub_level: "81"
            os_patch_level: "2022-03"
            revision: "r11"
          - sub_level: "101"
            os_patch_level: "2022-04"
            revision: "r28"
          - sub_level: "110"
            os_patch_level: "2022-07"
            revision: "r1"
          - sub_level: "117"
            os_patch_level: "2022-09"
            revision: "r1"
          - sub_level: "136"
            os_patch_level: "2022-11"
            revision: "r15"
          - sub_level: "149"
            os_patch_level: "2023-01"
            revision: "r1"
          - sub_level: "160"
            os_patch_level: "2023-03"
            revision: "r1"
          - sub_level: "168"
            os_patch_level: "2023-04"
            revision: "r9"
          - sub_level: "177"
            os_patch_level: "2023-07"
            revision: "r3"
          - sub_level: "185"
            os_patch_level: "2023-09"
            revision: "r1"
          - sub_level: "198"
            os_patch_level: "2024-01"
            revision: "r17"
          - sub_level: "205"
            os_patch_level: "2024-03"
            revision: "r1"
          - sub_level: "209"
            os_patch_level: "2024-05"
            revision: "r13"
          - sub_level: "218"
            os_patch_level: "2024-08"
            revision: "r14"
          - sub_level: "226"
            os_patch_level: "2024-11"
            revision: "r8"
          - sub_level: "233"
            os_patch_level: "2025-02"
            revision: "r1"
          - sub_level: "236"
            os_patch_level: "2025-05"
            revision: "r1"
          - sub_level: "237"
            os_patch_level: "2025-06"
            revision: "r1"
          - sub_level: "240"
            os_patch_level: "2025-09"
            revision: "r1"
          - sub_level: "246"
            os_patch_level: "2025-12"
            revision: "r1"
          - sub_level: "X"
            os_patch_level: "lts"
            revision: "r1"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      revision: ${{ matrix.revision }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      bbr_variant: ${{ inputs.bbr_variant || 'bbrplus' }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}
      droidspaces_ntsync: ${{ inputs.droidspaces_ntsync || false }}
      artifact_upload_mode: ${{ inputs.artifact_upload_mode }}

  # Runs only when triggered directly; skipped when called from main.yml
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
